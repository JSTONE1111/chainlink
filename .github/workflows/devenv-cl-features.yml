name: Chainlink Node Features

on:
  schedule:
    - cron: "0 6 * * *" # Run daily at 6 AM

defaults:
  run:
    working-directory: devenv

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  features:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - test_name: "TestMultipleJobDistributors"
            env_configs: "env.toml,products/ocr2/basic.toml"
          - test_name: "TestReorgHeadTrackerFinalityViolation"
            env_configs: "env.toml,env-geth.toml,products/ocr2/basic.toml"
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Install Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3
        with:
          just-version: "1.40.0"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_IAM_ROLE_SDLC_ECR_READONLY_ARN }}
          aws-region: us-west-2

      - name: Authenticate to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Set up Go
        uses: actions/setup-go@v6 # v6
        with:
          cache: true
          go-version-file: devenv/go.mod
          cache-dependency-path: devenv/go.sum

      - name: Download Go dependencies
        run: |
          go mod download

      - name: Set environment variables
        id: set-env
        run: |
          echo "CHAINLINK_IMAGE=${{ secrets.REGISTRY_SDLC }}/chainlink:nightly-$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Setup environment
        env:
          FAKE_SERVER_IMAGE: ${{ secrets.FAKE_SERVER_IMAGE }}
        run: |
          cd cmd/cl && go install . && cd -

          # Use workflow dispatch env_config if provided, otherwise use matrix env_configs
          ENV_CONFIG="${{ matrix.env_configs }}"

          echo "Setting up environment with: cl $ENV_CONFIG"
          cl u $ENV_CONFIG

      - name: Run tests
        working-directory: devenv/tests/features
        env:
          CURRENT_TEST: ${{ matrix.test_name }}
        run: |
          # Use workflow dispatch test_name if provided, otherwise use matrix test_name
          TEST_TO_RUN="${{ github.event.inputs.test_name || matrix.test_name }}"

          echo "Running tests for: $CHAINLINK_IMAGE, test: $TEST_TO_RUN"
          go test -v -run "$TEST_TO_RUN"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs-${{ matrix.test_name }}
          path: devenv/tests/features/logs
          retention-days: 3
